version: 2

models:
  - name: stg_prices
    description: "Cleaned daily OHLCV prices"
    columns:
      - name: ticker
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: close
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false   # close must be > 0, not >= 0

  - name: stg_companies
    columns:
      - name: ticker
        tests: [not_null, unique]

  - name: stg_macro
    columns:
      - name: series_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: value
        tests: [not_null]