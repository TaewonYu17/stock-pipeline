name: 'stock_pipeline'
version: '1.0.0'
config-version: 2

profile: 'stock_pipeline'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  stock_pipeline:
    staging:
      +schema: STAGING        # models here land in STAGING schema
      +materialized: view     # staging models are views — no storage cost
    mart:
      +schema: MART           # models here land in MART schema  
      +materialized: table    # mart models are physical tables
    features:
      +schema: FEATURES       # models here land in FEATURES schema
      +materialized: table    # features are physical tables for Feast to read